parameters:
- name: preset
  type: string
- name: cmakeArgs
  type: string
  default: ''
- name: build_coverage
  type: string
  default: false

steps:
- task: NuGetAuthenticate@1
  displayName: "Autheticate to Artifact Feed"

- task: CMake@1
  displayName: "Configure All"
  inputs:
    workingDirectory: '.' 
    cmakeArgs: --preset ${{ parameters.preset }} -DCMAKE_TOOLCHAIN_FILE=$(VCPKG_INSTALLATION_ROOT)/scripts/buildsystems/vcpkg.cmake -B$(Build.BinariesDirectory) ${{ parameters.cmakeArgs }}

- task: CMake@1
  displayName: "Build All"
  inputs:
    workingDirectory: '.' 
    cmakeArgs: --build $(Build.BinariesDirectory) 

- task: CMake@1
  displayName: "Test All"
  inputs:
    workingDirectory: '.' 
    cmakeArgs: --build $(Build.BinariesDirectory) --target my-project-Report

- task: PublishTestResults@2
  displayName: "Publish Test Results"
  inputs:
    testResultsFormat: 'JUnit'
    testResultsFiles: '$(Build.BinariesDirectory)/**/*-Report.xml' 
    
- task: CMake@1 
  displayName: "Install All"
  inputs:
    workingDirectory: '.' 
    cmakeArgs: --install $(Build.BinariesDirectory) --prefix $(Build.ArtifactStagingDirectory) 

- publish: '$(Build.ArtifactStagingDirectory)'
  displayName: 'Publish Build Artifacts'
  artifact: $(Agent.JobName)

- ${{ if eq(parameters.build_coverage, true) }}:
  - task: CMake@1
    displayName: "Collect Code Coverage"
    inputs:
      workingDirectory: '.' 
      cmakeArgs: --build $(Build.BinariesDirectory) --target my-project-Coverage

  - script: |
      python -m pip install --upgrade pip
      pip install lcov_cobertura
      lcov_cobertura my-project-Coverage
    displayName: "Convert to Coverage Report Cobertura Format"
    workingDirectory: $(Build.BinariesDirectory)

  - task: PublishCodeCoverageResults@1
    inputs:
      codeCoverageTool: 'Cobertura' 
      summaryFileLocation: $(Build.BinariesDirectory)/coverage.xml
      failIfCoverageEmpty: true

